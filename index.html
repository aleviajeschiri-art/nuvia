<!DOCTYPE html>
<html>
<head>
  <title>Nuvia CRM</title>
</head>
<body>

  <h1>Nuvia CRM</h1>

  <h2>Agregar Cliente</h2>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="celular" placeholder="Celular">
  <button onclick="guardarCliente()">Guardar</button>
  <h2>Pipeline de Ventas</h2>

<div style="display:flex; gap:20px;">

  <div>
    <h3>Nuevo Lead</h3>
    <div id="nuevo_lead"></div>
  </div>

  <div>
    <h3>Contactado</h3>
    <div id="contactado"></div>
  </div>

  <div>
    <h3>Cotización Enviada</h3>
    <div id="cotizacion_enviada"></div>
  </div>

  <div>
    <h3>Confirmado</h3>
    <div id="confirmado"></div>
  </div>

  <div>
    <h3>Viajó</h3>
    <div id="viajo"></div>
  </div>

</div>
  <script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabaseUrl = "https://npfagyunubcrgioasddw.supabase.co";
  const supabaseKey = "sb_publishable_c314uHq-qKzKbe9Gm3MDEQ_0PqxRBlk";
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.guardarCliente = async function () {
    const nombre = document.getElementById("nombre").value;
    const celular = document.getElementById("celular").value;

    const { data, error } = await supabase
      .from("clients")
      .insert([{ name: nombre, phone: celular }]);
    if (error) {
      alert("Error guardando cliente");
      console.log(error);
  } else {
  alert("Cliente guardado correctamente");
  cargarClientes();
}
  };
    async function cargarClientes() {
  const { data, error } = await supabase
    .from("clients")
    .select("*");

  if (error) {
    console.log("Error cargando clientes:", error);
    return;
  }

  const lista = document.getElementById("listaClientes");
  lista.innerHTML = "";

  data.forEach(cliente => {
    const li = document.createElement("li");
    li.textContent = cliente.name + " - " + cliente.phone;
    lista.appendChild(li);
  });
}
    cargarClientes();
</script>
