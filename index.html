<!DOCTYPE html>
<html>
<head>
  <title>Nuvia CRM</title>
</head>
<body>

  <h1>Nuvia CRM</h1>

  <h2>Agregar Cliente</h2>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="celular" placeholder="Celular">
  <button onclick="guardarCliente()">Guardar</button>
  <h2>Pipeline de Ventas</h2>

<div style="display:flex; gap:20px;">

  <div>
    <h3>Nuevo Lead</h3>
    <div id="nuevo_lead"></div>
  </div>

  <div>
    <h3>Contactado</h3>
    <div id="contactado"></div>
  </div>

  <div>
    <h3>Cotización Enviada</h3>
    <div id="cotizacion_enviada"></div>
  </div>

  <div>
    <h3>Confirmado</h3>
    <div id="confirmado"></div>
  </div>

  <div>
    <h3>Viajó</h3>
    <div id="viajo"></div>
  </div>

</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabaseUrl = "https://gjoeernwzeybbksdhoy.supabase.co";
const supabaseKey = sb_publishable_c314uHq-qKzKbe9Gm3MDEQ_0PqxRBlk;

const supabase = createClient(supabaseUrl, supabaseKey);

window.cargarClientes = async function(){

const { data, error } = await supabase
.from("clients")
.select("*");

if(error){
console.log(error);
return;
}

["nuevo_lead","contactado","cotizacion_enviada","confirmado","viajo"].forEach(id=>{
const el = document.getElementById(id);
if(el) el.innerHTML="";
});

(data || []).forEach(cliente=>{

const card = document.createElement("div");

card.style.border="1px solid #ccc";
card.style.padding="8px";
card.style.margin="5px";
card.style.background="#f9f9f9";

card.innerHTML=`
<strong>${cliente.name || ""}</strong><br>
${cliente.phone || ""}<br><br>

<select onchange="cambiarEstado(${cliente.id}, this.value)">
<option value="Nuevo Lead" ${cliente.status==="Nuevo Lead"?"selected":""}>Nuevo Lead</option>
<option value="Contactado" ${cliente.status==="Contactado"?"selected":""}>Contactado</option>
<option value="Cotización Enviada" ${cliente.status==="Cotización Enviada"?"selected":""}>Cotización Enviada</option>
<option value="Confirmado" ${cliente.status==="Confirmado"?"selected":""}>Confirmado</option>
<option value="Viajó" ${cliente.status==="Viajó"?"selected":""}>Viajó</option>
</select>
`;

let estado=(cliente.status||"").toLowerCase();

if(estado==="nuevo lead")
document.getElementById("nuevo_lead")?.appendChild(card);

else if(estado==="contactado")
document.getElementById("contactado")?.appendChild(card);

else if(estado==="cotizacion enviada")
document.getElementById("cotizacion_enviada")?.appendChild(card);

else if(estado==="confirmado")
document.getElementById("confirmado")?.appendChild(card);

else if(estado==="viajo")
document.getElementById("viajo")?.appendChild(card);

});

};

window.cambiarEstado = async function(id,nuevoEstado){

await supabase
.from("clients")
.update({ status:nuevoEstado })
.eq("id",id);

cargarClientes();

};

window.guardarCliente = async function(){

const nombre=document.getElementById("nombre").value;
const celular=document.getElementById("celular").value;

await supabase.from("clients").insert([{
name:nombre,
phone:celular,
status:"Nuevo Lead"
}]);

cargarClientes();

};

window.addEventListener("DOMContentLoaded",()=>{
cargarClientes();
});

</script>
</body>
</html>
